services:
  go-api:
    build:
      context: .
      dockerfile: dockerfile
    image: dybev/go-lang-api:latest
    container_name: go-lang-api

    ports:
      - "8080:8080"

    restart: unless-stopped

    env_file:
      - .env

    environment:
      PORT: ${PORT:-8080}

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

    cpus: "1.0"
    mem_limit: "512m"

    stop_grace_period: 20s

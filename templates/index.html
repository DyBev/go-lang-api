{{ define "index.html" }}
  {{ template "base" . }}
{{ end }}

{{ define "content" }}
<h1>Go + HTMX (no framework)</h1>

<p>Server time: <strong hx-ext="sse" sse-connect="/events/time" sse-swap="message">{{ .Now }}</strong></p>

<button
  hx-get="/partials/time"
  hx-target="closest main"
  hx-swap="innerHTML">
  Refresh time
</button>
{{ end }}

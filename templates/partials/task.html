{{ define "task-uncompleted.html" }}
<div id="task-{{ .TaskID }}" sse-swap="task-{{ .TaskID }}-completed">
  <p id="taskName">{{ .TaskName }}</p>
  <button
    type="button"
    hx-patch="/api/complete-task/{{ .TaskID }}"
    hx-swap="none"
  >
    complete task
  </button>
</div>
{{ end }}

{{ define "task-completed.html" }}
<div id="{{ .TaskID }}" >
  <p id="taskName"><s>{{ .TaskName }}</s></p>
</div>
{{ end }}
